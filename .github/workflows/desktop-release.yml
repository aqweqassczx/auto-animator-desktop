name: desktop-release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify pipeline files
        shell: powershell
        run: |
          if (-not (Test-Path "..\run_pipeline_cli.py")) { throw "Missing ..\run_pipeline_cli.py" }
          if (-not (Test-Path "..\pipeline_core.py")) { throw "Missing ..\pipeline_core.py" }
          Write-Host "Pipeline files found."

      - name: Install dependencies
        run: npm ci

      - name: Build bundled pipeline runner
        run: powershell -ExecutionPolicy Bypass -File .\tools\build_pipeline_runner.ps1

      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: auto-animator-desktop-windows
          path: |
            desktop-app/src-tauri/target/release/bundle/msi/*.msi
            desktop-app/src-tauri/target/release/bundle/msi/*.zip
