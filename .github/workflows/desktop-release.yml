name: desktop-release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify pipeline files
        shell: powershell
        run: |
          if (-not (Test-Path "..\run_pipeline_cli.py")) { throw "Missing ..\run_pipeline_cli.py" }
          if (-not (Test-Path "..\pipeline_core.py")) { throw "Missing ..\pipeline_core.py" }
          Write-Host "Pipeline files found."

      - name: Install dependencies
        run: npm ci

      - name: Build bundled pipeline runner
        run: powershell -ExecutionPolicy Bypass -File .\tools\build_pipeline_runner.ps1

      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri:build -- --bundles msi,updater

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: auto-animator-desktop-windows
          path: |
            desktop-app/src-tauri/target/release/bundle/msi/*.msi
            desktop-app/src-tauri/target/release/bundle/msi/*.zip
            desktop-app/src-tauri/target/release/bundle/**/*.sig
            desktop-app/src-tauri/target/release/bundle/**/latest*.json

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify pipeline files
        run: |
          test -f ../run_pipeline_cli.py || (echo "Missing ../run_pipeline_cli.py" && exit 1)
          test -f ../pipeline_core.py || (echo "Missing ../pipeline_core.py" && exit 1)
          echo "Pipeline files found."

      - name: Install dependencies
        run: npm ci

      - name: Build bundled pipeline runner
        run: bash ./tools/build_pipeline_runner.sh

      - name: Build Tauri app (DMG)
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri:build -- --bundles dmg,updater

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: auto-animator-desktop-macos
          path: |
            desktop-app/src-tauri/target/release/bundle/dmg/*.dmg
            desktop-app/src-tauri/target/release/bundle/**/*.app.tar.gz
            desktop-app/src-tauri/target/release/bundle/**/*.app.tar.gz.sig
            desktop-app/src-tauri/target/release/bundle/**/*.sig
            desktop-app/src-tauri/target/release/bundle/**/latest*.json

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="$(jq -r '.package.version' desktop-app/src-tauri/tauri.conf.json)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: auto-animator-desktop-windows
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: auto-animator-desktop-macos
          path: release-assets/macos

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          make_latest: true
          generate_release_notes: true
          files: |
            release-assets/windows/**/*.msi
            release-assets/windows/**/*.zip
            release-assets/windows/**/*.sig
            release-assets/windows/**/latest*.json
            release-assets/macos/**/*.dmg
            release-assets/macos/**/*.tar.gz
            release-assets/macos/**/*.sig
            release-assets/macos/**/latest*.json
