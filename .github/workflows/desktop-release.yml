name: desktop-release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify pipeline files
        shell: powershell
        run: |
          if (-not (Test-Path "..\run_pipeline_cli.py")) { throw "Missing ..\run_pipeline_cli.py" }
          if (-not (Test-Path "..\pipeline_core.py")) { throw "Missing ..\pipeline_core.py" }
          Write-Host "Pipeline files found."

      - name: Install dependencies
        run: npm ci

      - name: Build bundled pipeline runner
        run: powershell -ExecutionPolicy Bypass -File .\tools\build_pipeline_runner.ps1

      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri:build -- --bundles msi,updater

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: auto-animator-desktop-windows
          path: |
            desktop-app/src-tauri/target/release/bundle/msi/*.msi
            desktop-app/src-tauri/target/release/bundle/msi/*.zip
            desktop-app/src-tauri/target/release/bundle/**/*.sig
            desktop-app/src-tauri/target/release/bundle/**/latest*.json

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify pipeline files
        run: |
          test -f ../run_pipeline_cli.py || (echo "Missing ../run_pipeline_cli.py" && exit 1)
          test -f ../pipeline_core.py || (echo "Missing ../pipeline_core.py" && exit 1)
          echo "Pipeline files found."

      - name: Install dependencies
        run: npm ci

      - name: Build bundled pipeline runner
        run: bash ./tools/build_pipeline_runner.sh

      - name: Build Tauri app (DMG)
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri:build -- --bundles dmg,updater

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: auto-animator-desktop-macos
          path: |
            desktop-app/src-tauri/target/release/bundle/dmg/*.dmg
            desktop-app/src-tauri/target/release/bundle/**/*.app.tar.gz
            desktop-app/src-tauri/target/release/bundle/**/*.app.tar.gz.sig
            desktop-app/src-tauri/target/release/bundle/**/*.sig
            desktop-app/src-tauri/target/release/bundle/**/latest*.json

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="$(jq -r '.package.version' desktop-app/src-tauri/tauri.conf.json)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: auto-animator-desktop-windows
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: auto-animator-desktop-macos
          path: release-assets/macos

      - name: Build updater manifest (latest.json)
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          url_encode() {
            python -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))" "$1"
          }

          mkdir -p release-assets/generated
          PLATFORMS='{}'

          WIN_ZIP="$(find release-assets/windows -type f -name '*.zip' | head -n 1 || true)"
          if [ -n "${WIN_ZIP}" ] && [ -f "${WIN_ZIP}.sig" ]; then
            WIN_NAME="$(basename "${WIN_ZIP}")"
            WIN_NAME_ENC="$(url_encode "${WIN_NAME}")"
            WIN_SIG="$(tr -d '\r\n' < "${WIN_ZIP}.sig")"
            PLATFORMS="$(jq --arg url "${BASE_URL}/${WIN_NAME_ENC}" --arg sig "${WIN_SIG}" '. + {"windows-x86_64":{"url":$url,"signature":$sig}}' <<< "${PLATFORMS}")"
          fi

          while IFS= read -r MAC_TAR; do
            [ -z "${MAC_TAR}" ] && continue
            [ ! -f "${MAC_TAR}.sig" ] && continue
            MAC_NAME="$(basename "${MAC_TAR}")"
            MAC_NAME_ENC="$(url_encode "${MAC_NAME}")"
            MAC_SIG="$(tr -d '\r\n' < "${MAC_TAR}.sig")"
            PLATFORM_KEY="darwin-x86_64"
            case "${MAC_NAME}" in
              *aarch64*|*arm64*) PLATFORM_KEY="darwin-aarch64" ;;
            esac
            PLATFORMS="$(jq --arg key "${PLATFORM_KEY}" --arg url "${BASE_URL}/${MAC_NAME_ENC}" --arg sig "${MAC_SIG}" '. + {($key):{"url":$url,"signature":$sig}}' <<< "${PLATFORMS}")"
          done < <(find release-assets/macos -type f -name '*.app.tar.gz' | sort)

          if [ "$(jq 'length' <<< "${PLATFORMS}")" -eq 0 ]; then
            echo "No updater artifacts found to build latest.json"
            exit 1
          fi

          jq -n \
            --arg version "${VERSION}" \
            --arg notes "Auto release ${TAG}" \
            --arg pub_date "${PUB_DATE}" \
            --argjson platforms "${PLATFORMS}" \
            '{version:$version,notes:$notes,pub_date:$pub_date,platforms:$platforms}' \
            > release-assets/generated/latest.json

          echo "Generated release-assets/generated/latest.json"
          cat release-assets/generated/latest.json

      - name: Validate updater URLs against built artifacts
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import pathlib
          import urllib.parse
          manifest = pathlib.Path("release-assets/generated/latest.json")
          data = json.loads(manifest.read_text(encoding="utf-8"))
          artifact_names = {p.name for p in pathlib.Path("release-assets").rglob("*") if p.is_file()}
          missing = []
          for platform, row in data.get("platforms", {}).items():
            url = row.get("url", "")
            name = pathlib.Path(urllib.parse.urlparse(url).path).name
            decoded = urllib.parse.unquote(name)
            if decoded not in artifact_names:
              missing.append((platform, decoded))
          if missing:
            print("Updater manifest points to missing artifacts:")
            for platform, name in missing:
              print(f" - {platform}: {name}")
            raise SystemExit(1)
          print("Updater manifest URLs validated against artifacts.")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          make_latest: true
          generate_release_notes: true
          files: |
            release-assets/windows/**/*.msi
            release-assets/windows/**/*.zip
            release-assets/windows/**/*.sig
            release-assets/windows/**/latest*.json
            release-assets/macos/**/*.dmg
            release-assets/macos/**/*.tar.gz
            release-assets/macos/**/*.sig
            release-assets/macos/**/latest*.json
            release-assets/generated/latest.json
